services:
  # ── Backend (headless CLI / harness) ────────────────────────────────────
  # Runs in headless CLI mode (SPRING_PROFILES_ACTIVE=PROD) for the harness.
  # The frontend service has been removed — this compose file now targets
  # the backend only.
  #
  # Start the headless backend with:
  #   docker-compose up
  backend:
    image: ghcr.io/malu2555/looma:latest
    build:
      # Build context is the backend/ directory so the image can contain BOTH
      # the Java backend (looma_assistant/) and the synchronous Python runner
      # (runner/, requirements.text). The Dockerfile lives in looma_assistant/.
      context: ./backend
      dockerfile: looma_assistant/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Relative mounts work on both Windows (Docker Desktop) and Linux.
      # Create ./input_data and ./output_data directories before running.
      - ./input_data:/input 
      - ./output_data:/output
    environment:
      - FIREWORKS_BASE_URL=${FIREWORKS_BASE_URL}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - ALLOWED_MODELS=${ALLOWED_MODELS}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-PROD}
